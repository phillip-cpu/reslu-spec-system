<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<title>Your design proposal is ready</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0; background-color:#EDE8DE;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#EDE8DE;">
<tr>
<td align="center" style="padding:40px 16px 48px;">
<table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px; width:100%;">

<tr>
<td align="center" style="padding:0 0 18px;">
<img src="https://www.reslu.com.au/reslu-logo.png" width="96" alt="RESLU" style="display:block; width:96px; height:auto; border:0;">
</td>
</tr>

<!-- the card / paper — single table cell, per card spec section 7 -->
<tr>
<td align="center" style="background-color:#faf6ec; border:1px solid #e6dfcf; border-radius:1px; padding:44px;">

<!-- debossed mark: #e2dac5 block, RESLU letterspaced, two-tone border stands in for the bevel (no shadows/filters in email) -->
<table role="presentation" width="64" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
<tr>
<td width="64" height="64" align="center" valign="middle" bgcolor="#e2dac5" style="width:64px; height:64px; background-color:#e2dac5; border-top:1px solid #f3ead2; border-left:1px solid #f3ead2; border-right:1px solid #c9bd9d; border-bottom:1px solid #c9bd9d; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:400; font-size:9px; letter-spacing:2px; color:#9c8f74;">RESLU</td>
</tr>
</table>

<div style="font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:400; font-size:10px; letter-spacing:3px; color:#A08C72; padding:20px 0 0;">DESIGN PROPOSAL</div>

<div style="font-family:'Caveat', 'Segoe Script', 'Bradley Hand', cursive; font-weight:600; font-size:28px; line-height:1.3; color:#274690; padding:16px 0 0;">{{company}}</div>

<div style="font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:300; font-size:12px; letter-spacing:1.5px; color:#313131; padding:8px 0 0;">{{visit_date}}</div>

<div style="font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:300; font-size:12px; line-height:1.6; color:#5F5E5A; padding:14px 0 0;">{{project_name}}</div>

<div style="padding:30px 0 0;">
<a href="{{request_link}}" style="display:inline-block; background-color:#313131; color:#F5F1E8; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:400; font-size:11px; letter-spacing:3px; text-decoration:none; padding:15px 32px;">OPEN YOUR PROPOSAL</a>
</div>

<div style="font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:300; font-size:12px; line-height:1.7; color:#5F5E5A; padding:26px 0 0;">Take your time with it &middot; questions, just reply to this email.</div>

</td>
</tr>

<tr>
<td align="center" style="padding:28px 0 0; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight:300; font-size:10px; letter-spacing:2px; color:#313131;">
RESLU &middot; Design &amp; Build Studio &middot; 219 Sturt Street, Adelaide SA 5000
</td>
</tr>

</table>
</td>
</tr>
</table>
</body>
</html>
