<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RESLU Second Brain — visualizer reference</title>
<!--
  APPROVED DESIGN REFERENCE — RESLU second brain visualizer (Step 13 of build brief).
  Rendering, palette, motion, typography and layout are FROZEN.
  Engineering scope: wire CL[] + RT[] to live data, aggregation cap 1500 dots,
  click-to-open records, search filter. See build brief Step 13.
-->
<style>
  html,body{margin:0;background:#050507;font-family:-apple-system,'Segoe UI',sans-serif;}
  #stage{position:relative;max-width:960px;margin:24px auto;background:#08080c;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
  #rb2{width:100%;height:760px;display:block;}
  #panel{position:absolute;top:16px;right:16px;width:172px;background:rgba(14,14,20,0.88);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;font-size:11px;color:#8a8aa0;}
  #panel input[type=text]{width:100%;box-sizing:border-box;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);color:#c8c8d6;font-size:11px;padding:6px 8px;border-radius:6px;outline:none;}
  #panel p{margin:12px 0 5px;letter-spacing:2px;font-size:10px;color:#66667a;}
  .lb2{flex:1;font-size:11px;padding:3px 0;background:transparent;border:1px solid rgba(255,255,255,0.12);color:#a8a8ba;border-radius:5px;cursor:pointer;}
  .lb2.on{background:rgba(255,255,255,0.88);border-color:rgba(255,255,255,0.88);color:#16161c;}
  #panel input[type=range]{width:100%;accent-color:#c9803a;}
  #panel label{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:#8a8aa0;}
  #tip2{position:absolute;display:none;background:rgba(18,18,26,0.95);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:5px 10px;font-size:11px;color:#d8d8e4;pointer-events:none;white-space:nowrap;letter-spacing:0.3px;}
</style>
</head>
<body>
<div id="stage">
<canvas id="rb2"></canvas>
<div id="panel">
<input type="text" id="srch" placeholder="Search 12,466 records… ( / )">
<p>LAYOUT</p>
<div style="display:flex;gap:4px;">
<button class="lb2" data-m="1">Force</button>
<button class="lb2" data-m="0">Circle</button>
<button class="lb2" data-m="0">Hex</button>
<button class="lb2 on" data-m="0">Rings</button>
</div>
<p>RING SPIN</p>
<input id="spin2" type="range" min="0" max="1" step="0.01" value="0.15">
<label><input id="fn2" type="checkbox" style="width:12px;height:12px;">Record names</label>
</div>
<div id="tip2"></div>
</div>
<script>
const C=document.getElementById('rb2'),X=C.getContext('2d'),tip=document.getElementById('tip2');
let W=960,H=760,cx=480,cy=380;
function fit(){const d=window.devicePixelRatio||1;W=C.clientWidth;H=C.clientHeight;C.width=W*d;C.height=H*d;X.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2;}
fit();window.addEventListener('resize',fit);
function hx(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
function sh(c,p){const[r,g,b]=hx(c);const f=p<0?0:255,a=Math.abs(p);return'rgb('+Math.round(r+(f-r)*a)+','+Math.round(g+(f-g)*a)+','+Math.round(b+(f-b)*a)+')';}
function rgba(c,a){const[r,g,b]=hx(c);return'rgba('+r+','+g+','+b+','+a+')';}
const SPR={};
function spr(c){if(SPR[c])return SPR[c];const s=document.createElement('canvas');s.width=64;s.height=64;const x2=s.getContext('2d');
let g=x2.createRadialGradient(32,32,10,32,32,30);g.addColorStop(0,rgba(c,0.22));g.addColorStop(1,rgba(c,0));
x2.fillStyle=g;x2.beginPath();x2.arc(32,32,30,0,6.283);x2.fill();
g=x2.createRadialGradient(27,26,2,32,32,16);g.addColorStop(0,sh(c,0.55));g.addColorStop(0.45,c);g.addColorStop(1,sh(c,-0.38));
x2.fillStyle=g;x2.beginPath();x2.arc(32,32,16,0,6.283);x2.fill();
SPR[c]=s;return s;}
/* LIVE DATA HOOK (Step 13): replace CL with counts from workspace_index and
   real record names; keep colors and sector angles. */
const CL=[
{n:'EMAILS',c:'#b9aee6',a0:-1.25,a1:0.95,d:0.85,cnt:'5893',bx:0.66,by:0.32,nm:['laminex price update','zip lead time','client rfi','quote request','supplier intro']},
{n:'ITEMS',c:'#c47fd3',a0:2.0,a1:3.0,d:0.7,cnt:'1483',bx:0.32,by:0.7,nm:['polytec ravine','zip hydrotap','interpon d1000','bolon flooring']},
{n:'JOBS',c:'#8fd0c9',a0:3.6,a1:4.25,d:0.68,cnt:'214',bx:0.3,by:0.26,nm:['bayside clinic','14 harrow st','northcote cafe']},
{n:'DIARY + SOW',c:'#d8c98a',a0:4.45,a1:5.0,d:0.6,cnt:'732',bx:0.52,by:0.16,nm:['site diary','sow rev c']},
{n:'LEADS',c:'#7d9cd8',a0:3.05,a1:3.5,d:0.55,cnt:'96',bx:0.13,by:0.44,nm:['rmit lab','docklands office']}
];
const dots=[];
CL.forEach(cl=>{let i=0;
for(let r=104;r<=212;r+=12){for(let a=cl.a0+6/r;a<cl.a1;a+=12.5/r){
if(Math.random()<cl.d){let s=1.5+Math.random()*2.1;if(Math.random()<0.05)s=4.5+Math.random()*3;
dots.push({cl,r,a,s,i:i++,al:0.6+Math.random()*0.4,nm:null,pr:Math.random()<0.03});}}}
const big=dots.filter(d=>d.cl===cl&&d.s>4).sort((x,y)=>y.s-x.s);
if(big[0]){big[0].s=9.5;big[0].cnt=cl.cnt;big[0].pr=1;big[0].al=1;}
big.forEach((d,k)=>{d.nm=cl.nm[k%cl.nm.length];});});
const webs=[];CL.forEach(cl=>{const ds=dots.filter(d=>d.cl===cl);for(let k=0;k<Math.min(30,ds.length);k++){webs.push([ds[Math.floor(Math.random()*ds.length)],ds[Math.floor(Math.random()*ds.length)]]);}});
const HEXT=document.createElement('canvas');HEXT.width=440;HEXT.height=440;
(function(){const x2=HEXT.getContext('2d');x2.save();x2.beginPath();x2.arc(220,220,218,0,6.283);x2.clip();
x2.strokeStyle='rgba(255,255,255,0.05)';x2.lineWidth=0.5;const s=13;
for(let row=0;row<28;row++)for(let col=0;col<24;col++){const px=col*s*1.73+(row%2?s*0.87:0),py=row*s*1.5;
x2.beginPath();for(let h=0;h<6;h++){const ha=h/6*6.283+1.5708;const qx=px+s*Math.cos(ha),qy=py+s*Math.sin(ha);h?x2.lineTo(qx,qy):x2.moveTo(qx,qy);}x2.closePath();x2.stroke();}
x2.restore();})();
/* LIVE DATA HOOK: RT from real cron definitions */
const RT=['heartbeat · every 5 min · mac mini','mail sweep 7am · talon strip','indexer 2am · vercel cron','price watch · daily','pdf ocr pass · nightly'];
const APPS=[['G','Gmail'],['S','Supabase'],['V','Vercel'],['O','Ollama · mac mini'],['C','Claude'],['X','Xero'],['D','Drive'],['H','GitHub'],['Q','aria_queue'],['W','workspace_index'],['P','pdf pipeline'],['M','MCP tools']];
let m=0,tgt=0,rot=0,spd=0.15,names=false,hit=[],mx=-99,my=-99,q='';
document.querySelectorAll('.lb2').forEach(b=>{b.onclick=()=>{tgt=+b.dataset.m;
document.querySelectorAll('.lb2').forEach(o=>o.classList.remove('on'));b.classList.add('on');};});
document.getElementById('spin2').oninput=e=>spd=+e.target.value;
document.getElementById('fn2').onchange=e=>names=e.target.checked;
document.getElementById('srch').oninput=e=>q=e.target.value.toLowerCase().trim();
function match(d){if(!q)return true;return(d.nm&&d.nm.includes(q))||d.cl.n.toLowerCase().includes(q);}
function lp(a,b){return a+(b-a)*m;}
function blob(cl,i){const br=5.4*Math.sqrt(i),ba=i*2.39996;return[cl.bx*W+br*Math.cos(ba),cl.by*H+br*Math.sin(ba)];}
function cap(t2,x,y,c,sz){try{X.letterSpacing='3px';}catch(e){}
X.fillStyle=c;X.font='400 '+(sz||11)+'px sans-serif';X.textAlign='center';X.fillText(t2,x,y);
try{X.letterSpacing='0px';}catch(e){}}
function draw(t){
m+=(tgt-m)*0.06;rot+=spd*0.0012;
X.fillStyle='#08080c';X.fillRect(0,0,W,H);
const fade=1-m;
if(fade>0.02){
X.globalAlpha=fade;
let g=X.createRadialGradient(cx,cy,30,cx,cy,224);g.addColorStop(0,'rgba(32,22,50,0.85)');g.addColorStop(0.8,'rgba(24,17,38,0.5)');g.addColorStop(1,'rgba(24,17,38,0)');
X.fillStyle=g;X.beginPath();X.arc(cx,cy,226,0,6.283);X.fill();
X.globalAlpha=fade*0.6;X.drawImage(HEXT,cx-220,cy-220);
X.globalAlpha=fade;
X.strokeStyle='rgba(125,156,216,0.22)';X.lineWidth=0.75;X.beginPath();X.arc(cx,cy,292,0,6.283);X.stroke();
X.strokeStyle='rgba(199,154,78,0.28)';X.beginPath();X.arc(cx,cy,250,0,6.283);X.stroke();
X.strokeStyle='rgba(255,255,255,0.05)';X.beginPath();X.arc(cx,cy,224,0,6.283);X.stroke();
cap('APPLICATIONS',cx,cy-280,'rgba(143,178,221,0.75)',12);
cap('ROUTINES',cx,cy-237,'rgba(199,154,78,0.8)',12);
cap('MEMORY',cx,cy-200,'rgba(143,123,216,0.8)',12);
cap('SKILLS',cx,cy-90,'rgba(201,128,58,0.9)',12);
X.globalAlpha=1;}
dots.forEach(d=>{const a=d.a+rot;const B=blob(d.cl,d.i);
d.px=lp(cx+d.r*Math.cos(a),B[0]);d.py=lp(cy+d.r*Math.sin(a),B[1]);});
X.lineWidth=0.5;
webs.forEach(([A,B])=>{X.strokeStyle=rgba(A.cl.c,0.045);X.beginPath();X.moveTo(A.px,A.py);X.lineTo(B.px,B.py);X.stroke();});
const sr=[[44,26],[60,36],[76,46]];
sr.forEach(([r,n],ri)=>{for(let k=0;k<n;k++){const a=k/n*6.283+rot*(ri%2?-1.1:1.1);
const rx=lp(cx+r*Math.cos(a),0.21*W+4.8*Math.sqrt(ri*46+k)*Math.cos((ri*46+k)*2.4));
const ry=lp(cy+r*Math.sin(a),0.83*H+4.8*Math.sqrt(ri*46+k)*Math.sin((ri*46+k)*2.4));
X.save();X.translate(rx,ry);X.rotate(0.785+rot*2);X.fillStyle='rgba(201,128,58,0.85)';X.fillRect(-1.6,-1.6,3.2,3.2);X.restore();}});
hit=[];
dots.forEach(d=>{X.globalAlpha=match(d)?d.al:0.15;
X.drawImage(spr(d.cl.c),d.px-d.s*2,d.py-d.s*2,d.s*4,d.s*4);
X.globalAlpha=1;
if(d.pr&&d.s>3){X.strokeStyle='rgba(255,255,255,0.28)';X.lineWidth=0.75;X.beginPath();X.ellipse(d.px,d.py,d.s*2.1,d.s*0.65,-0.35,0,6.283);X.stroke();}
if(d.cnt){X.fillStyle=sh(d.cl.c,-0.72);X.font='500 11px sans-serif';X.textAlign='center';X.fillText(d.cnt,d.px,d.py+3.5);}
if(d.nm){hit.push({x:d.px,y:d.py,r:d.s+3,t:d.nm+' · '+d.cl.n.toLowerCase()});
if(names){X.fillStyle='rgba(255,255,255,0.42)';X.font='11px sans-serif';X.textAlign='center';X.fillText(d.nm,d.px,d.py+d.s+12);}}});
CL.forEach(cl=>{const ma=(cl.a0+cl.a1)/2+rot;
const x=lp(cx+90*Math.cos(ma),cl.bx*W),y=lp(cy+90*Math.sin(ma),cl.by*H);
X.drawImage(spr(cl.c),x-14,y-14,28,28);
X.strokeStyle='rgba(255,255,255,0.35)';X.lineWidth=0.75;X.beginPath();X.arc(x,y,10,0,6.283);X.stroke();
cap(cl.n,x,y+24,'rgba(255,255,255,0.68)');
hit.push({x,y,r:12,t:cl.n+' · '+cl.cnt+' records'});});
for(let k=0;k<16;k++){const a=k/16*6.283+rot*0.35-1.57;
const x=lp(cx+250*Math.cos(a),0.78*W+5.8*Math.sqrt(k)*Math.cos(k*2.4)*2.2),y=lp(cy+250*Math.sin(a),0.83*H+5.8*Math.sqrt(k)*Math.sin(k*2.4)*2.2);
X.strokeStyle='rgba(199,154,78,0.45)';X.lineWidth=0.75;X.beginPath();X.arc(x,y,7.5,0,6.283);X.stroke();
X.fillStyle='#c79a4e';X.beginPath();X.arc(x,y,2.8,0,6.283);X.fill();
if(k%4===0){const sa=t*0.0016+k;X.fillStyle='rgba(232,201,138,0.8)';X.beginPath();X.arc(x+10.5*Math.cos(sa),y+10.5*Math.sin(sa),1.3,0,6.283);X.fill();}
hit.push({x,y,r:9,t:RT[k%RT.length]});}
APPS.forEach(([L,nm2],k)=>{const a=k/APPS.length*6.283+0.13+rot*0.18-1.57;
const x=lp(cx+292*Math.cos(a),0.5*W+((k%4)-1.5)*36),y=lp(cy+292*Math.sin(a),0.92*H+(Math.floor(k/4)-1)*32);
X.fillStyle='rgba(16,21,31,0.9)';X.strokeStyle='rgba(125,156,216,0.4)';X.lineWidth=0.75;X.beginPath();
for(let h2=0;h2<6;h2++){const ha=h2/6*6.283+1.5708;const px=x+14*Math.cos(ha),py=y+14*Math.sin(ha);h2?X.lineTo(px,py):X.moveTo(px,py);}
X.closePath();X.fill();X.stroke();
X.fillStyle='rgba(207,224,245,0.78)';X.font='400 11px sans-serif';X.textAlign='center';X.fillText(L,x,y+4);
hit.push({x,y,r:15,t:nm2});});
const ax=cx,ay=lp(cy,0.45*H);
let g2=X.createRadialGradient(ax,ay,4,ax,ay,26);g2.addColorStop(0,'rgba(201,128,58,0.3)');g2.addColorStop(1,'rgba(201,128,58,0)');
X.fillStyle=g2;X.beginPath();X.arc(ax,ay,26,0,6.283);X.fill();
X.fillStyle='#160d05';X.strokeStyle='rgba(201,128,58,0.9)';X.lineWidth=1;
X.beginPath();X.roundRect(ax-11,ay-11,22,22,5);X.fill();X.stroke();
X.fillStyle='#c9803a';X.font='500 11px sans-serif';X.textAlign='center';X.fillText('A',ax,ay+4);
cap('ARIA.MD',ax,ay+30,'rgba(255,255,255,0.8)');
let g3=X.createRadialGradient(cx,cy,H*0.32,cx,cy,H*0.58);g3.addColorStop(0,'rgba(8,8,12,0)');g3.addColorStop(1,'rgba(4,4,7,0.55)');
X.fillStyle=g3;X.fillRect(0,0,W,H);
const h3=hit.find(h=>{const dx=h.x-mx,dy=h.y-my;return dx*dx+dy*dy<h.r*h.r;});
if(h3){X.strokeStyle='rgba(255,255,255,0.4)';X.lineWidth=0.75;X.beginPath();X.arc(h3.x,h3.y,h3.r+3,0,6.283);X.stroke();
tip.style.display='block';tip.style.left=Math.min(mx+14,W-170)+'px';tip.style.top=(h3.y-32)+'px';tip.textContent=h3.t;C.style.cursor='pointer';}
else{tip.style.display='none';C.style.cursor='default';}
requestAnimationFrame(draw);}
requestAnimationFrame(draw);
C.addEventListener('mousemove',e=>{const b=C.getBoundingClientRect();mx=e.clientX-b.left;my=e.clientY-b.top;});
C.addEventListener('mouseleave',()=>{mx=-99;my=-99;});
</script>
</body>
</html>
